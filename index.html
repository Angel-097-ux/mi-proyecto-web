<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Mi Galería con Flexbox</h1>

    <div class="gallery">
        <img src="img/20251027_152943.jpg" alt="Cataratas del Iguazú">
        <img src="img/20260215_185559.jpg" alt="Arcoiris en ruta">
        <img src="img/20251104_123312.jpg" alt="Playa Brasil">
        <img src="img/20251101_165904.jpg" alt="Jangada en muro alto">
        <img src="img/20260201_201339.jpg" alt="Atardecer cordobés">
        <img src="img/20260214_190228.jpg" alt="Preparando cabalgata">
    </div>

    <div id="miModal" class="modal">
        <span class="cerrar">&times;</span>
        <img class="modal-contenido" id="img01">
        <div id="caption"></div>
    </div>

    <script>
        const modal = document.getElementById("miModal");
        const modalImg = document.getElementById("img01");
        const captionText = document.getElementById("caption");
        const span = document.getElementsByClassName("cerrar")[0];

        document.querySelectorAll('.gallery img').forEach(img => {
            img.onclick = function() {
                modal.style.display = "block";
                modalImg.src = this.src;
                captionText.innerHTML = this.alt;
            }
        });

        // Cerrar al hacer clic en la X o en el fondo oscuro
        modal.onclick = function() {
            modal.style.display = "none";
        }
    </script>
</body>
</html>
